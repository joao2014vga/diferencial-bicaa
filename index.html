<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brascof · Simulador de Negociação</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0e0c;--surface:#181714;--surface2:#211f1b;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --gold:#c8a96e;--gold-dim:#8a7148;--gold-glow:rgba(200,169,110,0.15);
  --text:#ede8df;--muted:#7a7368;--muted2:#534f47;
  --neg:#c0614a;--pos:#6a9e6a;--info:#5b8db8;
  --mono:'DM Mono',monospace;--serif:'Fraunces',serif;
}
html{font-size:15px}
body{background:var(--bg);color:var(--text);font-family:var(--mono);min-height:100vh;padding:2.5rem 1.25rem 5rem;position:relative;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E")}
body::after{content:'';position:fixed;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent 0%,var(--gold) 40%,var(--gold) 60%,transparent 100%);opacity:.55}
.page{max-width:900px;margin:0 auto;position:relative;z-index:1}

header{text-align:center;margin-bottom:2.5rem;animation:fadeUp .6s ease both}
.eyebrow{font-size:10px;letter-spacing:.25em;color:var(--gold);text-transform:uppercase;margin-bottom:.9rem;display:flex;align-items:center;justify-content:center;gap:12px}
.eyebrow::before,.eyebrow::after{content:'';display:block;height:1px;width:36px;background:var(--gold-dim)}
h1{font-family:var(--serif);font-weight:300;font-size:clamp(1.8rem,4vw,2.6rem);line-height:1.1;margin-bottom:.3rem}
h1 em{font-style:italic;color:var(--gold)}
.subtitle{font-size:11px;color:var(--muted);letter-spacing:.06em}

.tabs{display:flex;gap:3px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:4px;margin-bottom:2rem;animation:fadeUp .6s .05s ease both}
.tab-btn{flex:1;background:transparent;border:none;border-radius:8px;padding:.6rem .5rem;font-family:var(--mono);font-size:10px;letter-spacing:.08em;color:var(--muted);cursor:pointer;transition:background .2s,color .2s;text-transform:uppercase;line-height:1.4}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{background:var(--surface2);color:var(--gold);border:1px solid var(--border2)}
.panel{display:none}.panel.active{display:block;animation:fadeUp .35s ease both}

.sec{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold-dim);margin:0 0 .75rem;display:flex;align-items:center;gap:10px}
.sec::after{content:'';flex:1;height:1px;background:var(--border)}

.ig{display:grid;gap:10px;margin-bottom:1.25rem}
.ig-2{grid-template-columns:repeat(2,1fr)}
.ig-3{grid-template-columns:repeat(3,1fr)}
.ig-4{grid-template-columns:repeat(4,1fr)}
@media(max-width:620px){.ig-3,.ig-4{grid-template-columns:repeat(2,1fr)}.ig-2{grid-template-columns:1fr}}

.icard{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:.9rem .85rem;transition:border-color .2s,box-shadow .2s}
.icard:focus-within{border-color:var(--gold-dim);box-shadow:0 0 0 3px var(--gold-glow)}
.ilabel{font-size:10px;letter-spacing:.13em;color:var(--muted);text-transform:uppercase;margin-bottom:6px;display:block}
.irow{display:flex;align-items:baseline;gap:4px}
.ipfx{font-size:10px;color:var(--muted);flex-shrink:0}
.frete-badge{font-size:11px;color:var(--gold);margin-top:4px;display:block;letter-spacing:.05em}

input[type=number]{background:transparent;border:none;outline:none;color:var(--text);font-family:var(--mono);font-size:16px;font-weight:500;width:100%;-moz-appearance:textfield}
input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
select{background:transparent;border:none;outline:none;color:var(--text);font-family:var(--mono);font-size:14px;font-weight:500;width:100%;cursor:pointer}
select option{background:var(--surface2);color:var(--text)}

.div{display:flex;align-items:center;gap:10px;margin:1rem 0}
.div::before,.div::after{content:'';flex:1;height:1px;background:var(--border)}
.div span{font-size:10px;letter-spacing:.18em;color:var(--muted2);text-transform:uppercase}

.steps{display:flex;flex-direction:column;gap:2px;margin-bottom:1.25rem}
.step{background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:.75rem 1rem;display:grid;grid-template-columns:1.6rem 1fr auto auto;align-items:center;gap:10px}
@media(max-width:550px){.step{grid-template-columns:1.6rem 1fr auto}.sfml{display:none}}
.sn{font-size:10px;color:var(--gold-dim);letter-spacing:.1em}
.slbl{font-size:11px;color:var(--muted);letter-spacing:.03em}
.sfml{font-size:10px;color:var(--muted2);text-align:right}
.sval{font-size:13px;font-weight:500;color:var(--text);text-align:right;min-width:115px}
.su{font-size:9px;color:var(--muted);margin-left:2px}

.rg{display:grid;gap:10px;margin-bottom:1rem}
.rg-3{grid-template-columns:repeat(3,1fr)}
.rg-2{grid-template-columns:repeat(2,1fr)}
@media(max-width:600px){.rg-3{grid-template-columns:repeat(2,1fr)}}

.rcard{background:var(--surface2);border:1px solid var(--border2);border-radius:11px;padding:1.1rem 1rem;position:relative;overflow:hidden}
.rcard::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold-dim),transparent);opacity:.45}
.rlbl{font-size:10px;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;margin-bottom:.4rem}
.rval{font-family:var(--serif);font-size:1.65rem;font-weight:600;letter-spacing:-.02em;line-height:1}
.runit{font-size:10px;color:var(--muted);margin-top:.25rem;letter-spacing:.08em}
.rsub{font-size:11px;color:var(--muted);margin-top:.3rem}

.main-result{background:var(--surface2);border:1px solid var(--border2);border-radius:12px;padding:1.4rem 1.25rem;display:flex;align-items:center;justify-content:space-between;position:relative;overflow:hidden;margin-bottom:1.25rem}
.main-result::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold-dim),transparent);opacity:.5}
.mr-lbl{font-family:var(--serif);font-weight:300;font-size:1rem;color:var(--text)}
.mr-lbl small{display:block;font-family:var(--mono);font-size:10px;letter-spacing:.15em;color:var(--muted);text-transform:uppercase;margin-bottom:2px;font-weight:400}
.mr-val{font-family:var(--serif);font-size:clamp(1.8rem,4vw,2.4rem);font-weight:600;letter-spacing:-.02em;text-align:right;transition:color .3s}
.mr-unit{font-size:11px;color:var(--muted);display:block;text-align:right;margin-top:2px;letter-spacing:.08em;font-family:var(--mono)}

.c-neg{color:var(--neg)}.c-pos{color:var(--pos)}.c-gold{color:var(--gold)}.c-info{color:var(--info)}

.stbl{width:100%;border-collapse:collapse;margin-bottom:1.25rem}
.stbl td{padding:.5rem .85rem;border-bottom:1px solid var(--border);font-size:12px}
.stbl td:last-child{text-align:right;font-weight:500}
.stbl tr:last-child td{border-bottom:none}
.stbl .rtotal td{border-top:1px solid var(--border2);font-weight:500;color:var(--gold);padding-top:.75rem}

.footer{margin-top:2rem;text-align:center;font-size:11px;color:var(--muted2);letter-spacing:.06em}
.footer span{color:var(--gold-dim)}
.ts{font-size:10px;color:var(--muted2);text-align:center;margin-top:.3rem;letter-spacing:.1em}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="page">

<header>
  <div class="eyebrow">ICE Futures U.S. · Contrato C</div>
  <h1>Brascof · Simulador de <em>Negociação</em></h1>
  <p class="subtitle">Bica corrida — precificação completa para exportação</p>
</header>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab(0)">Precificação Completa</button>
  <button class="tab-btn" onclick="switchTab(1)">Preço R$ → Diff</button>
  <button class="tab-btn" onclick="switchTab(2)">Diff → Preço R$</button>
</div>

<!-- ===== PAINEL 1: PRECIFICAÇÃO COMPLETA ===== -->
<div class="panel active" id="panel-0">

  <div class="sec">Mercado</div>
  <div class="ig ig-3">
    <div class="icard">
      <label class="ilabel" for="v-preco">Preço Bica (R$/saca)</label>
      <div class="irow"><span class="ipfx">R$</span><input type="number" id="v-preco" value="1930" step="1" min="0" oninput="calc()"></div>
    </div>
    <div class="icard">
      <label class="ilabel" for="v-dolar">Dólar / PTAX</label>
      <div class="irow"><span class="ipfx">R$</span><input type="number" id="v-dolar" value="4.992" step="0.0001" min="0.0001" oninput="calc()"></div>
    </div>
    <div class="icard">
      <label class="ilabel" for="v-kc">Tela NY (KC)</label>
      <div class="irow"><input type="number" id="v-kc" value="303.8" step="0.05" min="0" oninput="calc()"><span class="ipfx">cts/lb</span></div>
    </div>
  </div>

  <div class="sec">Qualidade & Beneficiamento</div>
  <div class="ig ig-4">
    <div class="icard">
      <label class="ilabel" for="v-p1718">17/18 (%)</label>
      <div class="irow"><input type="number" id="v-p1718" value="20" step="1" min="0" max="100" oninput="calc()"><span class="ipfx">%</span></div>
    </div>
    <div class="icard">
      <label class="ilabel" for="v-premio">Prêmio 17/18 (cts/lb)</label>
      <div class="irow"><input type="number" id="v-premio" value="12" step="0.5" oninput="calc()"><span class="ipfx">cts/lb</span></div>
    </div>
    <div class="icard">
      <label class="ilabel" for="v-off">Offgrades / Catação (%)</label>
      <div class="irow"><input type="number" id="v-off" value="20" step="0.5" min="0" max="50" oninput="calc()"><span class="ipfx">%</span></div>
    </div>
    <div class="icard">
      <label class="ilabel" for="v-mill">Milling Loss (%)</label>
      <div class="irow"><input type="number" id="v-mill" value="0.25" step="0.05" min="0" oninput="calc()"><span class="ipfx">%</span></div>
    </div>
  </div>
  <div class="ig ig-4">
    <div class="icard">
      <label class="ilabel" for="v-lg">Low Grade (R$/saca)</label>
      <div class="irow"><span class="ipfx">R$</span><input type="number" id="v-lg" value="1387.22" step="1" min="0" oninput="calc()"></div>
    </div>
    <div class="icard">
      <label class="ilabel" for="v-sacas">Quantidade (sacas)</label>
      <div class="irow"><input type="number" id="v-sacas" value="500" step="1" min="1" oninput="calc()"></div>
    </div>
    <div class="icard">
      <label class="ilabel" for="v-drymill">Dry Mill (USD/saca)</label>
      <div class="irow"><span class="ipfx">USD</span><input type="number" id="v-drymill" value="3" step="0.5" min="0" oninput="calc()"></div>
    </div>
    <div class="icard">
      <label class="ilabel" for="v-fob">FOB Costs (USD/saca)</label>
      <div class="irow"><span class="ipfx">USD</span><input type="number" id="v-fob" value="9.22" step="0.1" min="0" oninput="calc()"></div>
    </div>
  </div>

  <div class="sec">Logística & Financeiro</div>
  <div class="ig ig-4">
    <div class="icard" style="grid-column:span 2">
      <label class="ilabel" for="v-cidade">Frete — Cidade de Origem</label>
      <select id="v-cidade" onchange="calc()"></select>
      <span class="frete-badge" id="v-frete-badge">R$ — / saca</span>
    </div>
    <div class="icard">
      <label class="ilabel" for="v-juros">Juros (% a.a.)</label>
      <div class="irow"><input type="number" id="v-juros" value="11" step="0.5" min="0" oninput="calc()"><span class="ipfx">%</span></div>
    </div>
    <div class="icard">
      <label class="ilabel" for="v-dias">Ciclo Estoque (dias)</label>
      <div class="irow"><input type="number" id="v-dias" value="30" step="1" min="1" oninput="calc()"><span class="ipfx">dias</span></div>
    </div>
  </div>
  <div class="ig ig-2">
    <div class="icard">
      <label class="ilabel" for="v-broker">Broker?</label>
      <div class="irow">
